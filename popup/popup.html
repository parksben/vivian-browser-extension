<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClawTab</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="brand-text">
        <span class="brand-name">ClawTab</span>
        <span class="brand-sub">OpenClaw Browser Client</span>
      </div>
    </div>
    <div class="header-right">
      <div class="status-badge">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">—</span>
      </div>
      <button class="lang-btn" id="langBtn">中文</button>
    </div>
  </div>

  <div class="body">
    <!-- Config Section -->
    <div class="section">
      <div class="section-title" data-i18n="config"></div>
      <div class="form-group">
        <label>Gateway URL</label>
        <input type="text" id="gatewayUrl" placeholder="ws://localhost:18789" autocomplete="off" spellcheck="false" />
      </div>
      <div class="form-group">
        <label>Access Token</label>
        <div class="input-row">
          <input type="password" id="gatewayToken" placeholder="your-gateway-token" autocomplete="off" />
          <button class="icon-btn" id="toggleToken">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label><span data-i18n="browserName"></span> <span class="label-hint" data-i18n="browserNameHint"></span></label>
        <input type="text" id="browserName" placeholder="my_work_browser" autocomplete="off" maxlength="40" />
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="connectBtn" data-i18n="connect"></button>
        <button class="btn btn-secondary" id="disconnectBtn" data-i18n="disconnect"></button>
      </div>
    </div>

    <!-- Task Section（有任务时展示） -->
    <div class="section" id="taskSection" style="display:none;">
      <div class="section-title">
        <span data-i18n="task"></span>
        <span class="task-status-badge" id="taskStatusBadge"></span>
      </div>
      <div id="taskName" class="task-name"></div>
      <div id="taskSteps" class="task-steps"></div>
      <div class="task-actions">
        <button class="btn btn-danger" id="cancelTaskBtn" data-i18n="cancelTask"></button>
      </div>
    </div>

    <!-- Stats Section -->
    <div class="section">
      <div class="section-title" data-i18n="status"></div>
      <div id="occupiedBanner" class="occupied-banner" style="display:none;"></div>
      <div id="pairingBanner" class="pairing-banner" style="display:none;"></div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-label">Gateway</div>
          <div class="stat-value" id="statGateway">—</div>
        </div>
        <div class="stat-item">
          <div class="stat-label" data-i18n="browserIdLabel"></div>
          <div class="stat-value" id="statBrowserName">—</div>
        </div>
        <div class="stat-item">
          <div class="stat-label" data-i18n="tabsLabel"></div>
          <div class="stat-value" id="statTabs">0</div>
        </div>
      </div>
      <div class="last-cmd">
        <span class="stat-label" data-i18n="lastCmd"></span>
        <span class="stat-value cmd-value" id="statLastCmd">—</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
