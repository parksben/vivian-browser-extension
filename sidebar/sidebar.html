<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClawTab Chat</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>

  <div class="sidebar">

    <!-- ── Header ── -->
    <div class="sb-header">
      <select class="sb-agent-select" id="agentSelect">
        <option value="main">main</option>
      </select>
      <div class="sb-status-badge" id="statusBadge">
        <span class="sb-status-dot" id="statusDot"></span>
        <span class="sb-status-text" id="statusText">—</span>
      </div>
    </div>

    <!-- ── Messages ── -->
    <div class="sb-messages" id="messages">
      <div class="sb-empty" id="emptyState">
        <div class="sb-empty-icon">🦞</div>
        <div>请先在插件面板中连接 OpenClaw</div>
      </div>
    </div>

    <!-- ── Input ── -->
    <div class="sb-input-wrap">
      <div class="sb-autocomplete" id="pickAutocomplete"></div>
      <div class="sb-attachments" id="attachments"></div>
      <div class="sb-input-area">
        <button class="sb-pick-btn" id="pickBtn" title="拾取页面元素" disabled>
          <svg class="icon" width="14" height="14"><use href="#icon-mouse-pointer"></use></svg>
        </button>
        <textarea
          class="sb-input" id="msgInput"
          placeholder="发消息… (⌘/Ctrl+Enter 发送)"
          rows="1"
        ></textarea>
        <button class="sb-send-btn" id="sendBtn" disabled>
          <svg class="icon" width="15" height="15"><use href="#icon-send"></use></svg>
        </button>
      </div>
    </div>

  </div>
  <script src="../shared/icons.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
