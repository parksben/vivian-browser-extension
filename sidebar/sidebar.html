<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClawTab Chat</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <div class="sidebar">

    <!-- ── Header ── -->
    <div class="sb-header">
      <div class="sb-session" id="sessionDisplay">
        <span class="sb-session-key" id="sessionKeyDisplay">—</span>
      </div>
      <div class="sb-header-right">
        <select class="sb-agent-select" id="agentSelect">
          <option value="main">main</option>
        </select>
        <div class="sb-status-badge" id="statusBadge">
          <span class="sb-status-dot" id="statusDot"></span>
          <span class="sb-status-text" id="statusText">—</span>
        </div>
      </div>
    </div>

    <!-- ── Messages ── -->
    <div class="sb-messages" id="messages">
      <div class="sb-empty" id="emptyState">
        <div class="sb-empty-icon">🦞</div>
        <div>请先在插件面板中连接 OpenClaw</div>
      </div>
    </div>

    <!-- ── Input ── -->
    <div class="sb-input-area">
      <textarea
        class="sb-input" id="msgInput"
        placeholder="发消息… (⌘/Ctrl+Enter 发送)"
        rows="1"
      ></textarea>
      <button class="sb-send-btn" id="sendBtn" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

  </div>
  <script src="sidebar.js"></script>
</body>
</html>
